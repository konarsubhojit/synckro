name: Debug keystore setup helper

# Runs all the one-time setup steps from docs/debug-auth-setup.md and prints
# the values you need to paste into Google Cloud, Azure, and GitHub Secrets.
#
# Trigger manually: Actions -> "Debug keystore setup helper" -> Run workflow

on: workflow_dispatch

jobs:
  keystore-setup:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_FILE: debug.keystore
      KEY_ALIAS: androiddebugkey
      STORE_PASS: android
      KEY_PASS: android
      PACKAGE_NAME: com.konarsubhojit.synckro.debug
    steps:
      # ---------------------------------------------------------------
      # Step 1 — Create a pinned debug keystore
      # ---------------------------------------------------------------
      - name: "Step 1a — Generate debug keystore"
        run: |
          echo "::group::Generating $KEYSTORE_FILE"
          keytool -genkeypair \
            -keystore "$KEYSTORE_FILE" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Android Debug,O=Android,C=US"
          ls -la "$KEYSTORE_FILE"
          echo "::endgroup::"

      - name: "Step 1b — Print SHA-1 and SHA-256 fingerprints"
        id: fingerprints
        run: |
          echo "::group::keytool -list -v output"
          keytool -list -v \
            -keystore "$KEYSTORE_FILE" \
            -alias "$KEY_ALIAS" \
            -storepass "$STORE_PASS" | tee keytool-list.txt
          echo "::endgroup::"

          SHA1=$(grep -E "^\s*SHA1:" keytool-list.txt | head -1 | awk '{print $2}')
          SHA256=$(grep -E "^\s*SHA256:" keytool-list.txt | head -1 | awk '{print $2}')

          echo "sha1=$SHA1"     >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

          {
            echo "### Step 1 — Fingerprints"
            echo ""
            echo "| Algorithm | Fingerprint |"
            echo "|-----------|-------------|"
            echo "| SHA-1   | \`$SHA1\` |"
            echo "| SHA-256 | \`$SHA256\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: "Step 1c — Base64-encode the keystore (DEBUG_KEYSTORE_BASE64)"
        run: |
          B64=$(base64 -w0 "$KEYSTORE_FILE")
          echo "::group::DEBUG_KEYSTORE_BASE64 (copy the masked value from the artifact, not the log)"
          # Mask so the raw keystore bytes never appear in the public log.
          echo "::add-mask::$B64"
          echo "$B64"
          echo "::endgroup::"
          echo "$B64" > debug.keystore.b64

          {
            echo ""
            echo "### Step 1 — DEBUG_KEYSTORE_BASE64"
            echo ""
            echo "The base64 value is masked in the log for safety."
            echo "Download the \`debug-keystore\` artifact and copy the contents of \`debug.keystore.b64\`."
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Step 2 — Values you need for Google Cloud Console
      # ---------------------------------------------------------------
      - name: "Step 2 — Values for Google Cloud Android OAuth client"
        run: |
          echo "::group::Google Cloud Console inputs"
          echo "Package name:     $PACKAGE_NAME"
          echo "SHA-1 fingerprint: ${{ steps.fingerprints.outputs.sha1 }}"
          echo "::endgroup::"

          {
            echo ""
            echo "### Step 2 — Google Cloud (Android OAuth client)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Package name | \`$PACKAGE_NAME\` |"
            echo "| SHA-1 certificate fingerprint | \`${{ steps.fingerprints.outputs.sha1 }}\` |"
            echo ""
            echo "Also make sure a **Web application** OAuth client exists; its Client ID becomes the \`GOOGLE_WEB_CLIENT_ID\` secret."
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Step 3 — Values you need for Microsoft Entra (Azure AD)
      # ---------------------------------------------------------------
      - name: "Step 3 — Base64 SHA-1 signature hash + MSAL redirect URI"
        id: msal
        run: |
          # Azure expects the SHA-1 raw bytes base64-encoded (NOT the SHA-256).
          SIG_HASH=$(keytool -exportcert \
            -alias "$KEY_ALIAS" \
            -keystore "$KEYSTORE_FILE" \
            -storepass "$STORE_PASS" \
            | openssl sha1 -binary | openssl base64)

          # The redirect URI Azure generates is URL-encoded.
          ENCODED_HASH=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1], safe=''))" "$SIG_HASH")
          REDIRECT_URI="msauth://$PACKAGE_NAME/$ENCODED_HASH"

          echo "signature_hash=$SIG_HASH"   >> "$GITHUB_OUTPUT"
          echo "redirect_uri=$REDIRECT_URI" >> "$GITHUB_OUTPUT"

          echo "::group::Microsoft Entra inputs"
          echo "Package name:   $PACKAGE_NAME"
          echo "Signature hash: $SIG_HASH"
          echo "Redirect URI:   $REDIRECT_URI"
          echo "::endgroup::"

          {
            echo ""
            echo "### Step 3 — Microsoft Entra (Azure AD) Android platform"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Package name | \`$PACKAGE_NAME\` |"
            echo "| Signature hash (base64 SHA-1) | \`$SIG_HASH\` |"
            echo "| Expected redirect URI | \`$REDIRECT_URI\` |"
            echo ""
            echo "Confirm the redirect URI matches what Azure shows after clicking **Configure**, then copy it verbatim into the \`MSAL_REDIRECT_URI\` secret."
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Step 4 — Microsoft Graph permissions (informational only)
      # ---------------------------------------------------------------
      - name: "Step 4 — Microsoft Graph permissions reminder"
        run: |
          {
            echo ""
            echo "### Step 4 — Microsoft Graph permissions (optional)"
            echo ""
            echo "If you need OneDrive access, in the Entra app registration add:"
            echo ""
            echo "- **API permissions → Microsoft Graph → Delegated** → \`Files.ReadWrite\`"
            echo "  (or \`Files.ReadWrite.All\` for access outside the app folder)"
            echo ""
            echo "No admin consent is needed for delegated permissions on personal accounts."
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Step 5 — Checklist of secrets to add in GitHub
      # ---------------------------------------------------------------
      - name: "Step 5 — GitHub Actions secrets checklist"
        run: |
          {
            echo ""
            echo "### Step 5 — Add these secrets under **Settings → Secrets and variables → Actions**"
            echo ""
            echo "| Secret name | Value |"
            echo "|-------------|-------|"
            echo "| \`GOOGLE_WEB_CLIENT_ID\`    | Web OAuth Client ID from Step 2 |"
            echo "| \`MS_CLIENT_ID\`            | Application (client) ID from Step 3 |"
            echo "| \`MSAL_REDIRECT_URI\`       | \`${{ steps.msal.outputs.redirect_uri }}\` |"
            echo "| \`DEBUG_KEYSTORE_BASE64\`   | Contents of \`debug.keystore.b64\` (from the artifact) |"
            echo "| \`DEBUG_KEYSTORE_PASSWORD\` | \`$STORE_PASS\` |"
            echo "| \`DEBUG_KEY_ALIAS\`         | \`$KEY_ALIAS\` |"
            echo "| \`DEBUG_KEY_PASSWORD\`      | \`$KEY_PASS\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Step 6 — Verification hint
      # ---------------------------------------------------------------
      - name: "Step 6 — Verification hint"
        run: |
          {
            echo ""
            echo "### Step 6 — Verify"
            echo ""
            echo "After adding all secrets:"
            echo ""
            echo "1. Run the **Android CI** workflow."
            echo "2. Download the \`synckro-debug-apk-<run_number>\` artifact."
            echo "3. \`adb install app-debug.apk\` and try Google / Microsoft sign-in."
          } >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------
      # Upload keystore + base64 for download
      # ---------------------------------------------------------------
      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore
          path: |
            debug.keystore
            debug.keystore.b64
          retention-days: 7