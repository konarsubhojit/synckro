name: Android CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_API_LEVEL: '34'
      ANDROID_BUILD_TOOLS_VERSION: '34.0.0'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Read-only cache on PRs; writable on master pushes so future
          # runs can populate the cache. GitHub Actions caches are evicted
          # after 7 days of inactivity, which provides our 7-day cache TTL.
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          gradle-home-cache-cleanup: true

      - name: Cache Android SDK
        # Read-only cache on PRs; writable on master pushes. GitHub evicts
        # unused caches after 7 days, giving us the desired 7-day TTL.
        uses: actions/cache@v4
        if: github.event_name != 'pull_request'
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-v1
          restore-keys: |
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-
            ${{ runner.os }}-android-sdk-

      - name: Restore Android SDK cache (read-only on PRs)
        uses: actions/cache/restore@v4
        if: github.event_name == 'pull_request'
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-v1
          restore-keys: |
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-
            ${{ runner.os }}-android-sdk-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-${{ env.ANDROID_API_LEVEL }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}

      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/debug.keystore"
          fi

      - name: Run unit tests, lint, and assemble debug APK
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MSAL_REDIRECT_URI: ${{ secrets.MSAL_REDIRECT_URI }}
          DEBUG_KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: synckro-debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 14 }}

      - name: Upload unit-test coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-tests-${{ github.run_number }}
          path: app/build/reports/coverage/test/debug/
          if-no-files-found: ignore
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 14 }}

  migration-android-test:
    name: Migration instrumentation test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_API_LEVEL: '34'
      ANDROID_BUILD_TOOLS_VERSION: '34.0.0'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Read-only cache on PRs; writable on master pushes. GitHub
          # evicts unused caches after 7 days, giving us the 7-day TTL.
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          gradle-home-cache-cleanup: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-${{ env.ANDROID_API_LEVEL }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}
            emulator
            system-images;android-${{ env.ANDROID_API_LEVEL }};google_apis;x86_64

      - name: Cache AVD snapshot (writable on master)
        # Cache the created AVD + boot snapshot to skip cold-boot on subsequent
        # runs. Writable only on master pushes; PRs restore in read-only mode.
        # GitHub evicts unused caches after 7 days (our 7-day TTL).
        uses: actions/cache@v4
        if: github.event_name != 'pull_request'
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-avd-${{ env.ANDROID_API_LEVEL }}-google_apis-x86_64-pixel_6-v1
          restore-keys: |
            ${{ runner.os }}-avd-${{ env.ANDROID_API_LEVEL }}-google_apis-x86_64-pixel_6-
            ${{ runner.os }}-avd-${{ env.ANDROID_API_LEVEL }}-

      - name: Restore AVD snapshot (read-only on PRs)
        uses: actions/cache/restore@v4
        if: github.event_name == 'pull_request'
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: ${{ runner.os }}-avd-${{ env.ANDROID_API_LEVEL }}-google_apis-x86_64-pixel_6-v1
          restore-keys: |
            ${{ runner.os }}-avd-${{ env.ANDROID_API_LEVEL }}-google_apis-x86_64-pixel_6-
            ${{ runner.os }}-avd-${{ env.ANDROID_API_LEVEL }}-

      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/debug.keystore"
          fi

      - name: Install emulator runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Room migration instrumentation test
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MSAL_REDIRECT_URI: ${{ secrets.MSAL_REDIRECT_URI }}
          DEBUG_KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -no-snapshot-save -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.synckro.data.local.db.Migration11To12InstrumentedTest

      - name: Upload instrumentation test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-test-report-${{ github.run_number }}
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          if-no-files-found: ignore
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 14 }}

  
