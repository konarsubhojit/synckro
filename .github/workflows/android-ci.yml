name: Android CI

on:
  push:
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_API_LEVEL: '34'
      ANDROID_BUILD_TOOLS_VERSION: '34.0.0'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-v1
          restore-keys: |
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-
            ${{ runner.os }}-android-sdk-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-${{ env.ANDROID_API_LEVEL }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}

      - name: Decode debug keystore
        if: env.DEBUG_KEYSTORE_BASE64 != ''
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/debug.keystore"

      - name: Run unit tests, lint, and assemble debug APK
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MSAL_REDIRECT_URI: ${{ secrets.MSAL_REDIRECT_URI }}
          DEBUG_KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: synckro-debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
