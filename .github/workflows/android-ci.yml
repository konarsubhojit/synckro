name: Android CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

permissions:
  contents: read

jobs:
  build-apks:
    name: Build debug + testing release APKs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_API_LEVEL: '34'
      ANDROID_BUILD_TOOLS_VERSION: '34.0.0'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Read-only cache on PRs; writable on master pushes so future
          # runs can populate the cache. GitHub Actions caches are evicted
          # after 7 days of inactivity, which provides our 7-day cache TTL.
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          gradle-home-cache-cleanup: true

      - name: Cache Android SDK
        # Read-only cache on PRs; writable on master pushes. GitHub evicts
        # unused caches after 7 days, giving us the desired 7-day TTL.
        uses: actions/cache@v4
        if: github.event_name != 'pull_request'
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-v1
          restore-keys: |
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-
            ${{ runner.os }}-android-sdk-

      - name: Restore Android SDK cache (read-only on PRs)
        uses: actions/cache/restore@v4
        if: github.event_name == 'pull_request'
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-v1
          restore-keys: |
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-build-tools-${{ env.ANDROID_BUILD_TOOLS_VERSION }}-
            ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-
            ${{ runner.os }}-android-sdk-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-${{ env.ANDROID_API_LEVEL }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}

      - name: Decode debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/debug.keystore"
          fi

      - name: Derive per-build-type MSAL redirect URIs
        env:
          MSAL_REDIRECT_URI: ${{ secrets.MSAL_REDIRECT_URI }}
        run: |
          # Gradle configures every build type up front, so each build type's
          # MSAL host validation must see a URI with its own applicationId
          # host. From the single MSAL_REDIRECT_URI secret, derive both the
          # debug- and release-form URIs and expose them as build-type-specific
          # env vars consumed by app/build.gradle.kts.
          DEBUG_URI="$MSAL_REDIRECT_URI"
          RELEASE_URI="$MSAL_REDIRECT_URI"
          if [ -n "$MSAL_REDIRECT_URI" ]; then
            redirect_without_scheme="${MSAL_REDIRECT_URI#msauth://}"
            redirect_path="${redirect_without_scheme#*/}"
            if [ -n "$redirect_path" ] && [ "$redirect_path" != "$redirect_without_scheme" ]; then
              DEBUG_URI="msauth://com.synckro.debug/$redirect_path"
              RELEASE_URI="msauth://com.synckro/$redirect_path"
            fi
          fi
          echo "MSAL_REDIRECT_URI_DEBUG=$DEBUG_URI" >> "$GITHUB_ENV"
          echo "MSAL_REDIRECT_URI_RELEASE=$RELEASE_URI" >> "$GITHUB_ENV"

      - name: Run unit tests, lint, and assemble debug APK
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MSAL_REDIRECT_URI: ${{ secrets.MSAL_REDIRECT_URI }}
          DEBUG_KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug

      - name: Assemble testing release APK
        if: github.event_name != 'pull_request'
        env:
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MSAL_REDIRECT_URI: ${{ secrets.MSAL_REDIRECT_URI }}
          DEBUG_KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: synckro-debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 14 }}

      - name: Upload testing release APK artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: synckro-testing-release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 14 }}

      - name: Upload unit-test coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-tests-${{ github.run_number }}
          path: app/build/reports/coverage/test/debug/
          if-no-files-found: ignore
          retention-days: ${{ github.event_name == 'pull_request' && 3 || 14 }}
