name: 'Set up Android emulator environment'
description: >
  Sets up JDK 21 and Gradle, enables KVM group permissions, and optionally
  decodes a base64-encoded debug keystore. The caller must check out the
  repository before invoking this action.

inputs:
  keystore-base64:
    description: 'Base64-encoded debug keystore. Leave empty to skip keystore decode.'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: true

    - name: Enable KVM group permissions
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Decode debug keystore
      if: inputs.keystore-base64 != ''
      shell: bash
      env:
        KEYSTORE_BASE64: ${{ inputs.keystore-base64 }}
      run: echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/debug.keystore"
